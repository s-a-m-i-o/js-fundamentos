<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funções</title>
</head>
<body>
    <p>
        O que são funções?

        Uma função é um bloco de código que você define uma vez e pode executar quantas vezes quiser.
        Pensa numa receita de bolo — você escreve a receita uma vez e pode fazer o bolo quantas vezes quiser. A função é a receita.
    </p>
    <script>
        function apresentar(nome, idade){
            return `Ola meu nome é ${nome}, eu tenho ${idade} de idade`
        };

        const resultado = apresentar("Samio", 36);
        console.log(resultado);

    </script>
</body>
</html>
